<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }
    
    header {
      background-color: #282c34;
      color: white;
      padding: 1rem 0;
      text-align: center;
    }
    
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    
    h1 {
      margin-bottom: 1rem;
    }
    
    p {
      margin-bottom: 1rem;
    }
    
    button {
      background-color: #61dafb;
      border: none;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
    }
    
    button:hover {
      background-color: #4fa8c5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Testing</h1>
  </header>
  
  <main>
    <h2>Main Content</h2>
    <p>This is a basic landing page for testing purposes.</p>
    <button>Get Started</button>
  </main>
</body>
</html>
